async function sha256hex(str) {
  var buf = new TextEncoder().encode(str);
  var hashBuffer = await crypto.subtle.digest('SHA-256', buf);
  var hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doVerify() {
  var nameInput = document.getElementById('name').value.trim();
  var idcardInput = document.getElementById('idcard').value.trim();
  var msgEl = document.getElementById('msg');
  var boxEl = document.getElementById('downloadBox');
  var btn = document.getElementById('submitBtn');

  msgEl.className = 'msg'; msgEl.style.display = 'none';
  boxEl.style.display = 'none';

  if (!nameInput) { showMsg('请输入姓名', 'error'); return; }
  if (!idcardInput) { showMsg('请输入身份证号', 'error'); return; }

  showMsg('验证中...', 'loading');
  btn.disabled = true;

  try {
    var fullHash = await sha256hex(nameInput + idcardInput);
    var key = fullHash.substring(0, 16);

    var student = STUDENTS[key];
    if (!student) {
      showMsg('姓名或身份证号不正确，请核对后重试', 'error');
      btn.disabled = false;
      return;
    }

    msgEl.className = 'msg'; msgEl.style.display = 'none';
    document.getElementById('studentName').textContent = student.n + '，您好！';
    document.getElementById('fileInfo').textContent = '文件：' + student.file.split('/').pop();
    document.getElementById('downloadLink').href = student.file;
    boxEl.style.display = 'block';

    btn.innerHTML = '&#10003; 验证通过';
    btn.style.background = '#52c41a';
  } catch(e) {
    showMsg('系统错误，请刷新重试', 'error');
    btn.disabled = false;
  }
}

function showMsg(text, type) {
  var msgEl = document.getElementById('msg');
  msgEl.textContent = text;
  msgEl.className = 'msg ' + type;
  msgEl.style.display = 'block';
}

document.getElementById('idcard').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doVerify();
});
